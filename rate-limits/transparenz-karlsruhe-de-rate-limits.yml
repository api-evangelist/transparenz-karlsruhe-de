description: >-
  Transparency Portal for the City of Karlsruhe, Germany does not publish a formal rate-limit table for its open-data catalog API. Clients
  should paginate (rows/limit + start/offset), harvest politely, honor Retry-After, and use
  OAI-PMH or bulk endpoints for large extracts.
notes: No published limit; harvest responsibly.
