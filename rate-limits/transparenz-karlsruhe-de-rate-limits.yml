- https://raw.githubusercontent.com/api-evangelist/transparenz-karlsruhe-de/refs/heads/main/apis.yml
responseCodes:
  throttled: 429
limits:
- name: Default
  scope: client
  metric: requests-per-minute
  limit: see portal documentation
  notes: No published global limit.
policies:
- name: Backoff Strategy
  description: Exponential backoff with jitter; honor Retry-After.
