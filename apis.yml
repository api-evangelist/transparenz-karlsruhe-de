aid: transparenz-karlsruhe-de
name: Transparency Portal for the City of Karlsruhe, Germany
description: >-
  Transparency Portal for the City of Karlsruhe, Germany is a open data portal open-data portal for Germany running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 150 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
