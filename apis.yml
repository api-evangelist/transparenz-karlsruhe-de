    name: Transparency Portal for the City of Karlsruhe, Germany CKAN Action API
    description: >-
      CKAN Action API for Transparency Portal for the City of Karlsruhe, Germany, a consistent JSON-over-HTTP interface over a catalog of 150 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://transparenz.karlsruhe.de/api/3/action/.
